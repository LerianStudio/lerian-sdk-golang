version: "2"
run:
  tests: true
  timeout: 5m
linters:
  enable:
    # ===========================================
    # ERROR HANDLING (Critical for SDK reliability)
    # ===========================================
    - bodyclose       # HTTP response body must be closed
    - errcheck        # Check error returns
    - errchkjson      # Check JSON encoding errors
    - nilerr          # Returning nil after checking err != nil
    - errorlint       # Proper error wrapping with %w

    # ===========================================
    # SECURITY (Essential for financial SDK)
    # ===========================================
    - gosec           # Security-focused linting
    - noctx           # HTTP requests must use context

    # ===========================================
    # CODE QUALITY & COMPLEXITY
    # ===========================================
    - gocognit        # Cognitive complexity
    - gocyclo         # Cyclomatic complexity
    - funlen          # Function length limits
    - nestif          # Nested if limits
    - cyclop          # Alternative complexity checker
    - maintidx        # Maintainability index

    # ===========================================
    # CORRECTNESS & BUG PREVENTION
    # ===========================================
    - staticcheck     # Comprehensive static analysis
    - govet           # Go vet checks
    - ineffassign     # Ineffective assignments
    - wastedassign    # Wasted assignments
    - reassign        # Reassignment detection
    - copyloopvar     # Loop variable issues (Go 1.22+)
    - nilnil          # Returning nil, nil
    - predeclared     # Shadowing predeclared identifiers
    - makezero        # Slice initialization issues
    - durationcheck   # Duration multiplication issues

    # ===========================================
    # CODE STYLE & CONSISTENCY
    # ===========================================
    - revive          # Replacement for golint
    - misspell        # Spelling mistakes
    - dupword         # Duplicate words
    - unconvert       # Unnecessary conversions
    - usestdlibvars   # Use stdlib variables (http.MethodGet, etc.)
    - dogsled         # Too many blank identifiers
    - inamedparam     # Named params in long interfaces for readability
    - nakedret        # Naked returns
    - prealloc        # Preallocate slices
    - varnamelen      # Enforce meaningful variable names
    - nolintlint      # Proper nolint directives
    - wsl_v5          # Whitespace linter

    # ===========================================
    # CODE ORGANIZATION
    # ===========================================
    - depguard        # Dependency management
    - goconst         # Repeated strings as constants
    - gomoddirectives # Go mod directives

    # ===========================================
    # PATTERN ENFORCEMENT
    # ===========================================
    - forbidigo       # Forbid specific function calls

    # ===========================================
    # TESTING QUALITY
    # ===========================================
    - thelper         # Test helpers must call t.Helper()
    - tparallel       # Parallel test issues
    - testifylint     # Testify best practices

    # ===========================================
    # PERFORMANCE
    # ===========================================
    - loggercheck     # Logger key-value pairs
    - unparam         # Unused parameters

  settings:
    # -----------------------------------------
    # Complexity Settings
    # -----------------------------------------
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    funlen:
      lines: 80
      statements: 40
    nestif:
      min-complexity: 4
    cyclop:
      max-complexity: 15
    maintidx:
      under: 20

    # -----------------------------------------
    # Error Handling Settings
    # -----------------------------------------
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - io.Copy
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true

    # -----------------------------------------
    # Security Settings
    # -----------------------------------------
    gosec:
      excludes:
        - G104  # Unhandled errors (covered by errcheck)
        - G304  # File path from variable (needed for SDK)
        - G101  # False positive: env var NAMES containing "token"/"key" aren't credentials
        - G117  # False positive: config struct fields (AuthToken/APIKey) are redacted via String()/MarshalJSON()
        - G704  # SDK must make HTTP requests via user-provided URLs
      config:
        global:
          audit: false

    # -----------------------------------------
    # Pattern Enforcement (forbidigo)
    # -----------------------------------------
    forbidigo:
      # Global setting to exclude godoc examples from pattern matching
      exclude-godoc-examples: true
      analyze-types: true
      forbid:
        # Forbid fmt.Print* in non-example code (use structured logging)
        - pattern: '^fmt\.Print.*$'
          msg: "Use structured logging via pkg/observability instead of fmt.Print"

        # Forbid panic in library code
        - pattern: '^panic$'
          msg: "Do not use panic() in library code - return errors instead"

        # Forbid os.Exit in library code
        - pattern: '^os\.Exit$'
          msg: "Do not use os.Exit() in library code - return errors instead"

        # Forbid time.Sleep in non-test code (use context with timeout)
        - pattern: '^time\.Sleep$'
          msg: "Avoid time.Sleep - use context with timeout or time.After with select"

        # Forbid ioutil (deprecated)
        - pattern: '^ioutil\.'
          msg: "ioutil is deprecated - use io and os packages instead"

        # Forbid log package (use structured logging)
        - pattern: '^log\.(Print|Fatal|Panic).*$'
          msg: "Use structured logging via pkg/observability instead of log package"

        # Forbid http.Get/Post without context
        - pattern: '^http\.(Get|Post|Head)$'
          msg: "Use http.NewRequestWithContext instead for proper context propagation"

        # Forbid unsafe package
        - pattern: '^unsafe\.'
          msg: "Avoid unsafe package in SDK code"

        # Forbid errors.New in product code (use SDK error factories)
        - pattern: '^errors\.New$'
          msg: "Use sdkerrors.NewXxx() factory functions (NewValidation, NewNotFound, etc.) instead of errors.New()"

    # -----------------------------------------
    # Dependency Guard
    # -----------------------------------------
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/LerianStudio
            - github.com/stretchr/testify
            - go.opentelemetry.io
          deny:
            - pkg: io/ioutil
              desc: "Deprecated: Use io and os packages instead (Go 1.16+)"
            - pkg: github.com/pkg/errors
              desc: "Use standard errors package with fmt.Errorf and %w"

    # -----------------------------------------
    # Code Constants
    # -----------------------------------------
    goconst:
      min-len: 3
      min-occurrences: 3

    # -----------------------------------------
    # Go Vet
    # -----------------------------------------
    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true

    # -----------------------------------------
    # Revive Rules (Comprehensive)
    # -----------------------------------------
    revive:
      severity: warning
      enable-all-rules: false
      rules:
        # Critical - must fix
        - name: import-shadowing
          severity: error
        - name: context-as-argument
          severity: error
        - name: context-keys-type
          severity: error
        - name: error-return
          severity: error
        - name: range-val-in-closure
          severity: error
        - name: range-val-address
          severity: error
        - name: unreachable-code
          severity: error
        - name: struct-tag
          severity: error
        - name: constant-logical-expr
          severity: error
        - name: redefines-builtin-id
          severity: error
        - name: unconditional-recursion
          severity: error
        - name: identical-branches
          severity: error
        - name: datarace
          severity: error
        - name: waitgroup-by-value
          severity: error
        - name: atomic
          severity: error
        - name: string-of-int
          severity: error

        # Important - should fix
        - name: empty-block
          severity: warning
        - name: empty-lines
          severity: warning
        - name: use-any
          severity: warning
        - name: error-strings
          severity: warning
        - name: error-naming
          severity: warning
        - name: exported
          severity: warning
          arguments:
            - sayRepetitiveInsteadOfStutters
        - name: if-return
          severity: warning
        - name: increment-decrement
          severity: warning
        - name: var-naming
          severity: warning
        - name: var-declaration
          severity: warning
        - name: receiver-naming
          severity: warning
        - name: range
          severity: warning
        - name: indent-error-flow
          severity: warning
        - name: superfluous-else
          severity: warning
        - name: modifies-parameter
          severity: warning
        - name: bool-literal-in-expr
          severity: warning
        - name: imports-blocklist
          severity: error
        - name: redundant-import-alias
          severity: error
        - name: import-alias-naming
          severity: error
          arguments:
            - "^[a-z][a-z0-9]*$"
        - name: unnecessary-stmt
          severity: warning
        - name: deep-exit
          severity: warning
        - name: unused-parameter
          severity: warning
        - name: unused-receiver
          severity: warning
        - name: unhandled-error
          severity: warning
          arguments:
            - fmt.Printf
            - fmt.Println
            - fmt.Fprintf
        - name: cognitive-complexity
          severity: warning
          arguments: [20]
        - name: early-return
          severity: warning
        - name: defer
          severity: warning
          arguments:
            - ["call-chain", "loop"]
        - name: unexported-naming
          severity: warning
        - name: unexported-return
          severity: warning
        - name: useless-break
          severity: warning
        - name: confusing-results
          severity: warning
        - name: modifies-value-receiver
          severity: warning
        - name: time-equal
          severity: warning
        - name: time-naming
          severity: warning
        - name: optimize-operands-order
          severity: warning
        # Disabled: conflicts with forbidigo rule that forbids errors.New
        # in favor of sdkerrors.NewXxx() factory functions.
        # - name: use-errors-new
        #   severity: warning

    # -----------------------------------------
    # Whitespace Settings
    # -----------------------------------------
    wsl_v5:
      allow-first-in-block: true

    # -----------------------------------------
    # Testing Settings
    # -----------------------------------------
    testifylint:
      enable-all: true
      disable:
        # These catch pre-existing patterns across 400+ call sites.
        # Enable individually as the codebase is migrated.
        - error-is-as     # assert.ErrorIs / require.ErrorAs (315+ sites)
        - require-error   # require for error assertions (28+ sites)
        - float-compare   # assert.InEpsilon (8+ sites)
        - go-require      # require in goroutines / http handlers (10+ sites)
        - error-nil       # assert.NoError instead of assert.Nil(err) (11+ sites)
        - expected-actual  # reversed actual/expected (9+ sites)
        - empty           # assert.Empty (6+ sites)
        - len             # assert.Len (2+ sites)
        - compares        # assert.Greater etc. (pre-existing)

    # -----------------------------------------
    # Variable Name Length
    # -----------------------------------------
    varnamelen:
      min-name-length: 2
      ignore-names:
        - t
        - i
        - j
        - k
        - v
        - id
        - ok
        - wg
        - mu
        - fn
        - db
        - tx
        - tc
        - tt
        - s
        - c
        - w
        - r
        - b   # common for builders, backends, buffers
        - d   # common for data, duration
        - e   # common for event, entry, element
        - l   # common for list, length
        - n   # common for count, number
        - p   # common for provider, pointer, path
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-decls:
        - t testing.T
        - e error
        - b []byte

  # ===========================================
  # EXCLUSIONS
  # ===========================================
  exclusions:
    generated: lax
    rules:
      # Relax rules for test files
      - linters:
          - errcheck
          - gosec
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - maintidx
          - dupl
          - forbidigo
          - noctx
          - goconst
        path: _test\.go

      - linters:
          - inamedparam
        path: _test\.go

      - linters:
          - varnamelen
        path: _test\.go

      # Allow complexity in core transport layer
      - linters:
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - maintidx
          - nestif
        path: pkg/core/
      # Revive cognitive-complexity duplicates gocognit; exclude from core
      - linters:
          - revive
        path: pkg/core/
        text: "cognitive-complexity"
      # Allow empty-lines style in core transport (pre-existing formatting)
      - linters:
          - revive
        path: pkg/core/
        text: "empty-lines"

      # Allow complexity in observability setup
      - linters:
          - funlen
          - gocognit
        path: pkg/observability/

      # Allow fmt.Print, log, and complexity in examples (workflow demonstrations)
      - linters:
          - forbidigo
          - depguard
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - maintidx
          - nestif
          - errcheck
        path: examples/
      # Exclude revive cognitive-complexity in examples (duplicates gocognit)
      - linters:
          - revive
        path: examples/
        text: "cognitive-complexity"

      # Allow fmt.Print and complexity in test helpers (fake implementations)
      - linters:
          - forbidigo
          - gocognit
          - gocyclo
          - funlen
          - cyclop
        path: testing/
      # Exclude revive cognitive-complexity in testing/ (duplicates gocognit)
      - linters:
          - revive
        path: testing/
        text: "cognitive-complexity"

      # Relax unused-receiver and unused-parameter in test files (mock implementations)
      - linters:
          - revive
        path: _test\.go
        text: "unused-receiver"
      - linters:
          - revive
        path: _test\.go
        text: "unused-parameter"

      # Relax use-errors-new in test files (tests can use fmt.Errorf for simple errors)
      - linters:
          - revive
        path: _test\.go
        text: "use-errors-new"

      # Relax empty-lines in test files (stylistic, low priority)
      - linters:
          - revive
        path: _test\.go
        text: "empty-lines"

      # Relax revive in testing/ helpers (fake implementations satisfy interfaces)
      - linters:
          - revive
        path: testing/
        text: "unused-receiver"
      - linters:
          - revive
        path: testing/
        text: "unused-parameter"
      - linters:
          - revive
        path: testing/
        text: "if-return"

      # Relax unused-receiver/unused-parameter in pkg/ (interface implementations)
      - linters:
          - revive
        path: pkg/
        text: "unused-receiver"
      - linters:
          - revive
        path: pkg/
        text: "unused-parameter"

      # Exclude pkg/errors var-naming (package name "errors" is intentional for SDK error hierarchy)
      - linters:
          - revive
        path: pkg/errors/
        text: "var-naming"

      # Exclude stuttering type names in product packages (pre-existing naming convention)
      - linters:
          - revive
        text: "type name will be used as"

      # Existing exclusions
      - linters:
          - errcheck
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*print(f|ln)?|os\.(Un)?Setenv). is not checked
      - linters:
          - revive
        text: func name will be used as test\.Test.* by other packages
      - linters:
          - revive
        text: "package-comments: should have a package comment"
      - linters:
          - staticcheck
        text: "ST1000: at least one file in a package should have a package comment"
      - linters:
          - govet
        text: '^shadow: declaration of "(err|ok)" shadows declaration'

      # Allow errors.New in core infrastructure (cannot use sdkerrors due to dependency direction)
      - linters:
          - forbidigo
        path: pkg/core/
        text: "errors.New"

      # Allow errors.New in SDK root for sentinel errors
      - linters:
          - forbidigo
        path: ^errors\.go$
        text: "errors.New"

      # WSL is too noisy in examples and test helpers
      - linters:
          - wsl_v5
        path: examples/
      - linters:
          - wsl_v5
        path: testing/

    paths:
      - third_party$
      - builtin$
      - mocks$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  fix: false

formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
